<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON COACH - VISUAL PRO</title>
    <style>
        :root {
            --bg-color: #050810;
            --card-bg: #0F172A;
            --primary-neon: #00F2FF;
            --secondary-neon: #7000FF;
            --success-neon: #39FF14;
            --danger-neon: #FF003C;
            --text-color: #F8FAFC;
            --text-muted: #94A3B8;
            --border-glow: 0 0 15px rgba(0, 242, 255, 0.5);
        }

        * { box-sizing: border-box; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); margin: 0; min-height: 100vh; overflow-x: hidden; padding-bottom: 80px; }
        
        .container { max-width: 480px; margin: auto; padding: 20px; }
        .card { background: var(--card-bg); border-radius: 24px; padding: 24px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        h1, h2, h3 { color: var(--primary-neon); text-align: center; text-transform: uppercase; margin: 0 0 20px 0; letter-spacing: 1px; }
        h1 { text-shadow: var(--border-glow); font-size: 2rem; }

        input, select, button { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 12px; border: 1px solid #1E293B; background: #050810; color: white; font-size: 16px; outline: none; }
        button { background: var(--primary-neon); color: #000; font-weight: 800; border: none; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.95); }

        .hidden { display: none !important; }

        /* Navigation */
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 12px; border-top: 1px solid rgba(255,255,255,0.1); z-index: 1000; }
        .nav-item { color: var(--text-muted); font-size: 11px; display: flex; flex-direction: column; align-items: center; cursor: pointer; gap: 4px; flex: 1; }
        .nav-item.active { color: var(--primary-neon); }
        .nav-item svg { width: 24px; height: 24px; fill: currentColor; }

        /* Avatar System */
        .avatar-container { background: #050810; border-radius: 20px; padding: 20px; text-align: center; position: relative; margin-bottom: 20px; border: 1px dashed var(--primary-neon); }
        .human-svg { height: 250px; filter: drop-shadow(0 0 5px rgba(0,242,255,0.2)); }
        .muscle-part { fill: #1E293B; stroke: #334155; stroke-width: 1; cursor: pointer; transition: 0.3s; }
        .muscle-part.selected { fill: var(--primary-neon); stroke: white; }
        .muscle-part.active-workout { fill: var(--danger-neon); filter: drop-shadow(0 0 8px var(--danger-neon)); }

        /* Body Grid */
        .body-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .body-opt { padding: 15px; border-radius: 15px; border: 1px solid #1E293B; text-align: center; cursor: pointer; color: var(--text-muted); font-size: 14px; }
        .body-opt.selected { border-color: var(--primary-neon); background: rgba(0,242,255,0.1); color: white; }

        /* Dashboard */
        .macros { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .m-box { background: #1E293B; padding: 15px; border-radius: 16px; text-align: center; }
        .m-box span { display: block; font-size: 20px; font-weight: bold; color: var(--primary-neon); }

        /* Workout List */
        .ex-card { background: rgba(255,255,255,0.03); border-radius: 16px; padding: 16px; margin-bottom: 12px; border-right: 4px solid var(--secondary-neon); }
        .ex-inputs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 10px; }
        .ex-inputs input { margin-bottom: 0; padding: 8px; text-align: center; font-size: 14px; }

        /* Modal */
        #modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-body { background: var(--card-bg); width: 100%; max-width: 400px; border-radius: 30px; border: 2px solid var(--primary-neon); padding: 30px; text-align: center; }
    </style>
</head>
<body>

<div class="container" id="app">

    <div id="screen-login" class="card">
        <h1>NEON COACH</h1>
        <input type="email" id="email" placeholder="אימייל">
        <button onclick="login()">התחברות / הרשמה</button>
    </div>

    <div id="screen-onboarding" class="card hidden">
        <h2>בניית פרופיל</h2>
        <select id="gender" onchange="updateAvatarPreview()">
            <option value="female">נקבה</option>
            <option value="male">זכר</option>
        </select>
        <div style="display:flex; gap:10px;">
            <input type="number" id="age" placeholder="גיל">
            <input type="number" id="weight" placeholder="משקל">
            <input type="number" id="height" placeholder="גובה">
        </div>
        
        <label>יעד קלורי:</label>
        <select id="cal-mode" onchange="document.getElementById('manual-cal').classList.toggle('hidden', this.value==='auto')">
            <option value="auto">חישוב אוטומטי</option>
            <option value="manual">הזנה ידנית (למשל 1200)</option>
        </select>
        <input type="number" id="manual-cal" class="hidden" placeholder="כמה קלוריות ביום?">

        <label>איך נראה הגוף שלך?</label>
        <div class="body-grid">
            <div class="body-opt" onclick="setBody('current','hourglass')">⏳ שעון חול</div>
            <div class="body-opt" onclick="setBody('current','pear')">🍐 אגסי</div>
            <div class="body-opt" onclick="setBody('current','apple')">🍎 תפוחי</div>
            <div class="body-opt" onclick="setBody('current','broad')">🔼 רחב למעלה</div>
        </div>

        <label>לאיזה מראה תרצי להגיע?</label>
        <div class="body-grid">
            <div class="body-opt" onclick="setBody('target','korean')">✨ רזה קוריאני</div>
            <div class="body-opt" onclick="setBody('target','muscular')">💪 שרירי וחטוב</div>
        </div>

        <button onclick="goToAreas()">המשך לבחירת אזורים</button>
    </div>

    <div id="screen-areas" class="card hidden">
        <h2>מה נשפר היום?</h2>
        <p style="text-align:center; color:var(--text-muted);">לחצי על האיברים בדמות כדי לסמן אזורי מטרה</p>
        <div class="avatar-container" id="selection-avatar-box">
            </div>
        <button onclick="finishOnboarding()">סיימתי, בנה לי תוכנית!</button>
    </div>

    <div id="screen-main" class="hidden">
        <div class="card">
            <h2 id="user-greeting">היי שירלי!</h2>
            <div class="macros">
                <div class="m-box">קלוריות נותרו<span id="cals">0</span></div>
                <div class="m-box">חלבון נותר<span id="prots">0</span></div>
            </div>
            <p style="text-align:center; color:var(--success-neon); margin-top:15px;">צעדים: <span id="steps-val">0</span> | מים: <span id="water-val">0</span></p>
        </div>
        <div class="card" style="text-align:center;">
            <h3>הגוף שלך</h3>
            <div id="dash-avatar-box"></div>
        </div>
    </div>

    <div id="screen-nutrition" class="hidden">
        <div class="card">
            <h3>יומן ארוחות</h3>
            <input type="text" id="f-name" placeholder="שם המאכל">
            <div style="display:flex; gap:5px;">
                <input type="number" id="f-c" placeholder="קלוריות">
                <input type="number" id="f-p" placeholder="חלבון">
            </div>
            <button onclick="logFood()">הוסף ארוחה</button>
            <div id="food-list" style="max-height:200px; overflow-y:auto;"></div>
        </div>
    </div>

    <div id="screen-workout" class="hidden">
        <div class="card">
            <h3 id="workout-title">האימון היומי</h3>
            <div id="workout-list"></div>
        </div>
    </div>

    <div class="nav-bar hidden" id="nav">
        <div class="nav-item active" onclick="tab('main')">🏠<span>בית</span></div>
        <div class="nav-item" onclick="tab('workout')">🏋️<span>אימון</span></div>
        <div class="nav-item" onclick="tab('nutrition')">🥗<span>תזונה</span></div>
    </div>

</div>

<div id="modal" class="hidden">
    <div class="modal-body">
        <h3 id="modal-title">מיקוד שרירי</h3>
        <div id="modal-svg-box"></div>
        <p id="modal-text" style="color:var(--text-muted); margin-top:15px;"></p>
        <button onclick="document.getElementById('modal').classList.add('hidden')" style="background:var(--danger-neon); color:white;">סגור</button>
    </div>
</div>

<script>
    // SVG Templates
    function getHumanSVG(gender, highlightedPart = null, selectedParts = []) {
        // דמות פשוטה ונקייה ב-SVG
        const color = (part) => {
            if(part === highlightedPart) return 'var(--danger-neon)';
            if(selectedParts.includes(part)) return 'var(--primary-neon)';
            return '#1E293B';
        };

        return `
        <svg viewBox="0 0 100 220" class="human-svg">
            <circle cx="50" cy="20" r="12" fill="#1E293B" />
            <path class="muscle-part ${selectedParts.includes('chest')?'selected':''} ${highlightedPart==='chest'?'active-workout':''}" 
                  onclick="togglePart('chest')" d="M35 35 L65 35 L70 80 L30 80 Z" fill="${color('chest')}" />
            <path class="muscle-part ${selectedParts.includes('arms')?'selected':''} ${highlightedPart==='arms'?'active-workout':''}" 
                  onclick="togglePart('arms')" d="M70 35 L85 85 L75 88 L65 40 Z" fill="${color('arms')}" />
            <path class="muscle-part ${selectedParts.includes('arms')?'selected':''} ${highlightedPart==='arms'?'active-workout':''}" 
                  onclick="togglePart('arms')" d="M30 35 L15 85 L25 88 L35 40 Z" fill="${color('arms')}" />
            <path class="muscle-part ${selectedParts.includes('abs')?'selected':''} ${highlightedPart==='abs'?'active-workout':''}" 
                  onclick="togglePart('abs')" d="M30 85 L70 85 L65 120 L35 120 Z" fill="${color('abs')}" />
            <path class="muscle-part ${selectedParts.includes('legs')?'selected':''} ${highlightedPart==='legs'?'active-workout':''}" 
                  onclick="togglePart('legs')" d="M35 125 L48 210 L30 210 L25 125 Z" fill="${color('legs')}" />
            <path class="muscle-part ${selectedParts.includes('legs')?'selected':''} ${highlightedPart==='legs'?'active-workout':''}" 
                  onclick="togglePart('legs')" d="M65 125 L52 210 L70 210 L75 125 Z" fill="${color('legs')}" />
        </svg>`;
    }

    let state = { user: null, selectedParts: [] };

    function login() {
        const email = document.getElementById('email').value;
        if(!email) return alert("הזן מייל");
        const saved = localStorage.getItem('coach_'+email);
        if(saved) {
            state.user = JSON.parse(saved);
            tab('main');
        } else {
            state.user = { email, gender: 'female', parts: [], daily: { cals:0, p:0, foods:[] } };
            show('screen-onboarding');
        }
    }

    function updateAvatarPreview() {
        state.user.gender = document.getElementById('gender').value;
    }

    function setBody(type, val) {
        // ויזואליות בלבד לבחירה
        const group = event.target.parentElement.querySelectorAll('.body-opt');
        group.forEach(el => el.classList.remove('selected'));
        event.target.classList.add('selected');
        if(type==='current') state.user.currentBody = val;
        else state.user.targetBody = val;
    }

    function goToAreas() {
        show('screen-areas');
        document.getElementById('selection-avatar-box').innerHTML = getHumanSVG(state.user.gender);
    }

    function togglePart(part) {
        const idx = state.selectedParts.indexOf(part);
        if(idx === -1) state.selectedParts.push(part);
        else state.selectedParts.splice(idx, 1);
        document.getElementById('selection-avatar-box').innerHTML = getHumanSVG(state.user.gender, null, state.selectedParts);
    }

    function finishOnboarding() {
        state.user.parts = state.selectedParts;
        const w = document.getElementById('weight').value;
        const h = document.getElementById('height').value;
        const mode = document.getElementById('cal-mode').value;
        
        if(mode === 'manual') state.user.goalCals = Number(document.getElementById('manual-cal').value);
        else state.user.goalCals = Math.round((10*w) + (6.25*h) - 161 - 200); // נוסחת רזון

        state.user.goalProt = w * 1.5;
        save();
        tab('main');
    }

    function tab(name) {
        show('screen-'+name);
        document.getElementById('nav').classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        if(name==='workout') renderWorkouts();
        updateUI();
    }

    function renderWorkouts() {
        const list = document.getElementById('workout-list');
        list.innerHTML = '';
        const exercises = state.user.targetBody === 'korean' ? 
            [{n:"פילאטיס מזרן", m:"abs", d:"להרגיש את שרירי הבטן נאספים"}, {n:"סקוואט איטי", m:"legs", d:"דגש על יציבות והארכה"}] :
            [{n:"לחיצת חזה", m:"chest", d:"עבודה על כוח פלג גוף עליון"}, {n:"פשיטת רגליים", m:"legs", d:"בניית מסת שריר"}];

        exercises.forEach((ex, i) => {
            const div = document.createElement('div');
            div.className = 'ex-card';
            div.innerHTML = `
                <strong>${ex.n}</strong>
                <button onclick="showMuscle('${ex.m}', '${ex.d}')" style="background:none; color:var(--primary-neon); padding:0; width:auto; font-size:12px; text-decoration:underline; margin-right:10px;">מיקוד שרירי</button>
                <div class="ex-inputs">
                    <input type="number" placeholder="משקל">
                    <input type="number" placeholder="סטים">
                    <input type="number" placeholder="חזרות">
                </div>
            `;
            list.appendChild(div);
        });
    }

    function showMuscle(part, desc) {
        document.getElementById('modal').classList.remove('hidden');
        document.getElementById('modal-svg-box').innerHTML = getHumanSVG(state.user.gender, part);
        document.getElementById('modal-text').innerText = desc;
    }

    function logFood() {
        const c = Number(document.getElementById('f-c').value);
        const p = Number(document.getElementById('f-p').value);
        const n = document.getElementById('f-name').value;
        if(!n) return;
        state.user.daily.cals += c;
        state.user.daily.p += p;
        state.user.daily.foods.push({n, c});
        save();
        updateUI();
    }

    function updateUI() {
        document.getElementById('cals').innerText = state.user.goalCals - state.user.daily.cals;
        document.getElementById('prots').innerText = Math.round(state.user.goalProt - state.user.daily.p);
        document.getElementById('dash-avatar-box').innerHTML = getHumanSVG(state.user.gender, null, state.user.parts);
        const list = document.getElementById('food-list');
        list.innerHTML = state.user.daily.foods.map(f => `<div style="font-size:14px; margin-bottom:5px; border-bottom:1px solid #1E293B;">${f.n} - ${f.c} קל'</div>`).reverse().join('');
    }

    function save() {
        localStorage.setItem('coach_'+state.user.email, JSON.stringify(state.user));
    }

    function show(id) {
        ['screen-login','screen-onboarding','screen-areas','screen-main','screen-nutrition','screen-workout'].forEach(s => {
            document.getElementById(s).classList.add('hidden');
        });
        document.getElementById(id).classList.remove('hidden');
    }

    // וודא שהמודל מוסתר בהתחלה
    window.onload = () => { document.getElementById('modal').classList.add('hidden'); };
</script>
</body>
</html>
